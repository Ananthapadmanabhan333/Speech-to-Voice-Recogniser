[alembic]
# Path to migration scripts
script_location = neurolink.backend.db.migrations

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps
timezone = UTC

# Logging configuration
log_file = ../../logs/alembic.log

# Truncate long strings in SQL output
truncate_limit = 255

# Python import path
syspath = .

# Version number prefix for migration files
version_path_separator = os

# Output encoding for console
output_encoding = utf-8

# Message format for revision creation
# %(slug)s  - slug from the message
# %(rev)s   - revision id
# %(date)s  - current date
# %(branch)s - branch name
# %(down_revision)s - parent revision

[post_write_hooks]
# Post-write hooks are run after a migration is generated
hooks = black, isort

black.type = console_scripts
black.entrypoint = black
black.options = -l 120

isort.type = console_scripts
isort.entrypoint = isort
isort.options = --profile black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console,file

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console,file
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = INFO
formatter = generic

[handler_file]
class = TimedRotatingFileHandler
args = ('../../logs/alembic.log', 'midnight', 1, 30)
level = INFO
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
