name: CD
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      version:
        description: "Release version (e.g., v1.2.3)"
        required: false
        type: string

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}
      ai_worker_image: ${{ steps.meta-ai-worker.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Generate metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Generate metadata for AI worker
        id: meta-ai-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/ai-worker
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push AI worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ai/Dockerfile
          push: true
          tags: ${{ steps.meta-ai-worker.outputs.tags }}
          labels: ${{ steps.meta-ai-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging
    concurrency: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host staging
            HostName ${{ secrets.STAGING_HOST }}
            User ${{ secrets.STAGING_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF
      - name: Copy configuration
        run: |
          scp docker/docker-compose.yml staging:~/neurolink/
          scp cicd/scripts/deploy.sh staging:~/neurolink/
      - name: Run deployment
        run: |
          ssh staging "bash -s" << 'DEPLOY_SCRIPT'
            export ENVIRONMENT=staging
            export IMAGE_TAG=${{ github.sha }}
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            export REPO_OWNER=${{ github.repository_owner }}
            export DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
            export REDIS_URL=${{ secrets.STAGING_REDIS_URL }}
            export JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
            export API_KEY=${{ secrets.STAGING_API_KEY }}
            cd ~/neurolink
            bash deploy.sh
          DEPLOY_SCRIPT
      - name: Health check
        run: |
          python cicd/scripts/health_check.py \
            --base-url https://staging.neurolink.dev \
            --timeout 120 \
            --check-db --check-redis --check-model
      - name: Notify staging deploy
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Neurolink staging deployment ${{ job.status }}",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Neurolink Staging Deploy*\nStatus: ${{ job.status }}\nSHA: ${{ github.sha }}\nEnvironment: staging"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    needs: [build-and-push, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    concurrency: deploy-production
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host production
            HostName ${{ secrets.PROD_HOST }}
            User ${{ secrets.PROD_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF
      - name: Run database migrations
        run: |
          ssh production "bash -s" << 'MIGRATE'
            set -e
            cd ~/neurolink
            docker compose run --rm backend alembic upgrade head
          MIGRATE
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      - name: Copy configuration
        run: |
          scp docker/docker-compose.yml production:~/neurolink/
          scp cicd/scripts/deploy.sh production:~/neurolink/
      - name: Deploy to production
        id: deploy
        run: |
          ssh production "bash -s" << 'DEPLOY_SCRIPT'
            set -e
            export ENVIRONMENT=production
            export IMAGE_TAG=${{ github.sha }}
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            export REPO_OWNER=${{ github.repository_owner }}
            export DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
            export REDIS_URL=${{ secrets.PROD_REDIS_URL }}
            export JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            export API_KEY=${{ secrets.PROD_API_KEY }}
            export SENTRY_DSN=${{ secrets.PROD_SENTRY_DSN }}
            export LOG_LEVEL=INFO
            cd ~/neurolink
            bash deploy.sh
          DEPLOY_SCRIPT
      - name: Health check
        run: |
          python cicd/scripts/health_check.py \
            --base-url https://api.neurolink.dev \
            --timeout 180 \
            --check-db --check-redis --check-chroma --check-model --check-inference
        env:
          API_KEY: ${{ secrets.PROD_API_KEY }}
      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          ssh production "bash -s" << 'ROLLBACK'
            set -e
            cd ~/neurolink
            echo "Rolling back to previous deployment..."
            docker compose pull
            docker compose up -d --no-deps backend ai-worker frontend
            echo "Rollback complete"
          ROLLBACK
      - name: Notify production deploy
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Neurolink production deployment ${{ job.status }}",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Neurolink Production Deploy*\nStatus: ${{ job.status }}\nTag: ${{ github.ref_name }}\nSHA: ${{ github.sha }}\nEnvironment: production"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
