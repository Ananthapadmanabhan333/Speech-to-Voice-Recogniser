version: "3.12"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: neurolink-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
      - ../ai:/app/ai
      - ../vector_memory:/app/vector_memory
      - ../ml:/app/ml
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://neurolink:neurolink_pass@postgres:5432/neurolink
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - ENABLE_WEBSOCKET_COMPRESSION=true
      - MAX_WEBSOCKET_MESSAGE_SIZE=10485760
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - neurolink-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: neurolink-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app/frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - neurolink-net

  ai-worker:
    build:
      context: ..
      dockerfile: docker/ai/Dockerfile
    container_name: neurolink-ai
    volumes:
      - ../ai:/app/ai
      - ../ml:/app/ml
      - ../vector_memory:/app/vector_memory
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://neurolink:neurolink_pass@postgres:5432/neurolink
      - CHROMA_DB_PATH=/app/vector_memory/chroma
      - MODEL_CACHE=/app/data/models
      - LOG_LEVEL=INFO
      - ENABLE_GPU_INFERENCE=true
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - neurolink-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    container_name: neurolink-db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=neurolink
      - POSTGRES_PASSWORD=neurolink_pass
      - POSTGRES_DB=neurolink
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurolink"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - neurolink-net

  redis:
    image: redis:7-alpine
    container_name: neurolink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - neurolink-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: neurolink-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - neurolink-net

  nginx:
    image: nginx:alpine
    container_name: neurolink-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - neurolink-net

  monitoring:
    image: grafana/grafana:latest
    container_name: neurolink-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=neurolink_admin
    restart: unless-stopped
    networks:
      - neurolink-net

  prometheus:
    image: prom/prometheus:latest
    container_name: neurolink-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - neurolink-net

volumes:
  postgres-data:
  redis-data:
  chroma-data:
  grafana-data:
  prometheus-data:

networks:
  neurolink-net:
    driver: bridge
